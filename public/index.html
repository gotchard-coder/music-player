<!-- =================================================================== -->
<!-- 文件：index.html                                                     -->
<!-- 职责：音乐播放器的主页面（前端界面）                                    -->
<!-- 这个文件定义了整个应用的布局结构，用户看到的所有界面元素都在这里        -->
<!-- =================================================================== -->

<!-- 已实现的功能： -->
<!-- 1. 左侧边栏                                                          -->
<!--    - 歌曲列表显示（支持搜索过滤）                                      -->
<!--    - 歌单管理（创建、重命名、删除歌单）                                -->
<!--    - 歌曲上传功能                                                     -->
<!--    - 分页控件（歌曲太多时分页显示）                                    -->
<!--                                                                      -->
<!-- 2. 中间主区域                                                         -->
<!--    - 播放器显示区（封面图片、歌曲名、歌手名）                          -->
<!--    - 歌词面板（显示歌词、导入LRC/SRT歌词文件）                        -->
<!--                                                                      -->
<!-- 3. 底部播放控制栏                                                     -->
<!--    - 进度条（点击跳转播放位置）                                        -->
<!--    - 播放控制按钮（播放/暂停、上一曲、下一曲、随机播放、循环模式）      -->
<!--    - 音量控制（滑块调节、静音/取消静音）                               -->
<!--    - 时间显示（当前时间/总时长）                                       -->
<!--                                                                      -->
<!-- 4. 隐藏功能                                                           -->
<!--    - 文件上传选择框（支持多选音频文件）                                -->
<!--    - 上传进度弹窗（显示上传进度和状态）                                -->
<!--                                                                      -->
<!-- 5. 右键菜单                                                           -->
<!--    - 歌曲右键菜单（重命名、添加到歌单、删除）                          -->
<!--    - 歌单右键菜单（重命名、删除）                                      -->
<!--                                                                      -->
<!-- 6. 响应式设计                                                         -->
<!--    - 手机端自适应布局                                                  -->
<!--    - 手机端侧边栏菜单按钮                                             -->
<!--    - 手机端遮罩层（点击关闭侧边栏）                                    -->
<!--                                                                      -->
<!-- 7. PWA支持                                                            -->
<!--    - manifest.json配置（可安装到桌面）                                 -->
<!--    - 主题颜色设置                                                     -->
<!--    - 禁止缓存设置（确保总是获取最新版本）                              -->
<!-- =================================================================== -->

<!DOCTYPE html>  <!-- 声明这是一个 HTML5 文档 -->
<html lang="zh-CN">  <!-- 根元素，语言设为简体中文 -->
<head>  <!-- 头部：存放页面的配置信息，不会显示在页面上 -->
  <meta charset="UTF-8">  <!-- 字符编码用 UTF-8，支持中文显示 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- 让页面在手机上自适应宽度 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">  <!-- 禁止浏览器缓存页面 -->
  <meta http-equiv="Pragma" content="no-cache">  <!-- 兼容旧浏览器的缓存控制 -->
  <meta http-equiv="Expires" content="0">  <!-- 让页面立即过期，不缓存 -->
  <meta name="theme-color" content="#1a1a2e">  <!-- 手机浏览器顶部栏颜色（深蓝色），Android 通用 -->
  <meta name="mobile-web-app-capable" content="yes">  <!-- 允许 Android 把网页添加到桌面（通用标准） -->
  <title>music-播放器</title>  <!-- 浏览器标签页显示的标题 -->
  <link rel="manifest" href="manifest.json">  <!-- 引入 PWA 配置文件（让网页能像 App 一样安装） -->
  <link rel="stylesheet" href="css/style.css?v=7">  <!-- 引入样式文件，?v=7 是版本号，用于清除缓存 -->
</head>  <!-- head 结束 -->
<body>  <!-- 身体：存放页面所有可见的内容 -->

  <!-- ========== 整体容器 ========== -->
  <div class="app">  <!-- 整个应用的最外层容器 -->

    <!-- 手机端遮罩层：点击后关闭侧边栏 -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- ========== 左侧边栏：歌曲列表和歌单管理 ========== -->
    <aside class="sidebar" id="sidebar">  <!-- aside 表示侧边栏 -->

      <!-- 侧边栏头部：标题和按钮 -->
      <div class="sidebar-header">
        <div>
          <h2>我的音乐</h2>  <!-- 显示标题 -->
          <span class="song-count" id="songCount">0 首</span>  <!-- 显示歌曲数量，JS 会动态更新 -->
        </div>
        <div class="sidebar-header-right">
          <button id="uploadBtn" class="btn-upload">+ 上传</button>  <!-- 上传按钮，点击后选择音乐文件 -->
          <button class="btn-close-sidebar" id="closeSidebar">✕</button>  <!-- 关闭侧边栏按钮（手机端用） -->
        </div>
      </div>

      <!-- ========== 歌单区域：管理用户的歌单 ========== -->
      <div class="playlist-section">
        <!-- 歌单头部：歌单标题和新建按钮 -->
        <div class="playlist-header">
          <span class="playlist-title">我的歌单</span>  <!-- 显示"我的歌单"标题 -->
          <span class="playlist-count" id="playlistCount">0</span>  <!-- 显示歌单数量 -->
          <button class="btn-add-playlist" id="playlistAddBtn" title="新建歌单">+</button>  <!-- 点击后新建歌单 -->
          <!-- 新建歌单的输入框，默认隐藏，点击"+"后才会显示 -->
          <input type="text" class="playlist-name-input" id="playlistNameInput" placeholder="输入歌单名称" style="display:none">
        </div>
        <!-- 歌单列表容器：JS 会动态添加歌单项 -->
        <div class="playlist-list" id="playlistList">
          <!-- 歌单项会通过 JavaScript 动态插入这里 -->
        </div>
      </div>

      <!-- ========== 搜索框：搜索歌曲 ========== -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索歌曲...">  <!-- 搜索输入框，输入关键词过滤歌曲 -->
      </div>

      <!-- 歌曲列表头部：显示当前列表标题 -->
      <div class="song-list-header">
        <span class="song-list-title" id="songListTitle">全部歌曲</span>  <!-- 显示"全部歌曲"或某个歌单名称 -->
      </div>

      <!-- ========== 歌曲列表：显示所有歌曲 ========== -->
      <div class="song-list" id="songList">
        <div class="empty-tip">暂无歌曲，点击上传</div>  <!-- 当没有歌曲时显示的提示 -->
        <!-- 歌曲项会通过 JavaScript 动态插入这里 -->
      </div>

      <!-- ========== 分页控件：歌曲太多时分页显示 ========== -->
      <div class="pagination" id="pagination" style="display:none">  <!-- 默认隐藏，歌曲超过一定数量时显示 -->
        <button class="page-btn" id="pagePrev" disabled>‹</button>  <!-- 上一页按钮，禁用状态 -->
        <span class="page-info" id="pageInfo">1 / 1</span>  <!-- 显示当前页码，如"1 / 5" -->
        <button class="page-btn" id="pageNext" disabled>›</button>  <!-- 下一页按钮，禁用状态 -->
      </div>
    </aside>  <!-- 侧边栏结束 -->

    <!-- ========== 中间主区域：播放显示和歌词 ========== -->
    <main class="main">  <!-- main 表示主要内容区域 -->

      <!-- 手机端菜单按钮：点击后显示左侧边栏 -->
      <button class="btn-menu-mobile" id="menuBtn">☰</button>

      <!-- ========== 播放器显示区：封面、歌曲名、歌手 ========== -->
      <div class="player-display" id="playerDisplay">
        <!-- 封面图片区域 -->
        <div class="cover-wrapper">
          <div class="cover" id="cover">  <!-- 封面容器 -->
            <div class="cover-default">♪</div>  <!-- 默认封面图标（没有封面时显示） -->
          </div>
        </div>
        <!-- 歌曲信息区域 -->
        <div class="song-info">
          <div class="song-title" id="songTitle">未选择歌曲</div>  <!-- 歌曲标题，默认"未选择歌曲" -->
          <div class="song-artist" id="songArtist"></div>  <!-- 歌手名称 -->
        </div>
      </div>

      <!-- ========== 歌词面板：显示和管理歌词 ========== -->
      <div class="lyrics-panel" id="lyricsPanel">
        <!-- 歌词头部：标题和导入按钮 -->
        <div class="lyrics-header">
          <span class="lyrics-title">歌词</span>
          <!-- 导入歌词按钮（点击后选择 LRC/SRT 歌词文件） -->
          <label class="lyrics-upload-btn" id="lyricsUploadBtn" title="上传LRC或SRT歌词文件">
            <!-- 隐藏的文件选择框，只允许选择 .lrc 或 .txt 文件 -->
            <input type="file" id="lyricsInput" accept=".lrc,.txt,.srt" style="display:none">
            + 导入歌词
          </label>
        </div>
        <!-- 歌词内容区域：显示歌词文本 -->
        <div class="lyrics-content" id="lyricsContent">
          <div class="lyrics-empty">暂无歌词</div>  <!-- 没有歌词时显示的提示 -->
          <!-- 歌词行会通过 JavaScript 动态插入这里 -->
        </div>
      </div>
    </main>  <!-- 主区域结束 -->
  </div>  <!-- 整体容器结束 -->

  <!-- ========== 底部播放控制栏 ========== -->
  <footer class="player-bar">  <!-- footer 表示底部区域 -->

    <!-- 进度条：点击可跳转播放位置 -->
    <div class="progress-bar" id="progressBar">
      <!-- 进度条填充部分，JS 会动态设置它的宽度百分比 -->
      <div class="progress" id="progress"></div>
    </div>

    <!-- 控制按钮区域 -->
    <div class="controls">
      <!-- 左侧：时间显示 -->
      <div class="controls-left">
        <span class="time" id="currentTime">00:00</span>  <!-- 当前播放时间 -->
        <span class="time-sep">/</span>  <!-- 分隔符 -->
        <span class="time" id="duration">00:00</span>  <!-- 歌曲总时长 -->
      </div>

      <!-- 中间：播放控制按钮 -->
      <div class="controls-center">
        <button class="btn-ctrl" id="shuffleBtn" title="随机播放">⤮</button>  <!-- 随机播放开关 -->
        <button class="btn-ctrl" id="prevBtn" title="上一曲">⏮</button>  <!-- 上一曲按钮 -->
        <button class="btn-ctrl btn-play" id="playBtn" title="播放">▶</button>  <!-- 播放/暂停按钮 -->
        <button class="btn-ctrl" id="nextBtn" title="下一曲">⏭</button>  <!-- 下一曲按钮 -->
        <button class="btn-ctrl" id="repeatBtn" title="列表循环">↻</button>  <!-- 循环模式按钮 -->
        <button class="btn-ctrl" id="lyricsBtn" title="歌词">词</button>  <!-- 显示/隐藏歌词按钮 -->
      </div>

      <!-- 右侧：音量控制 -->
      <div class="controls-right">
        <button class="btn-ctrl" id="volumeBtn" title="音量">🔊</button>  <!-- 静音/取消静音按钮 -->
        <div class="volume-slider">
          <!-- 音量滑块：范围 0-100，默认 80 -->
          <input type="range" id="volumeSlider" min="0" max="100" value="80">
        </div>
        <span class="volume-value" id="volumeValue">80</span>  <!-- 显示当前音量数值 -->
      </div>
    </div>
  </footer>  <!-- 底部控制栏结束 -->

  <!-- ========== 隐藏元素 ========== -->

  <!-- 隐藏的文件选择框：点击"上传"按钮时 JS 会触发它 -->
  <!-- accept="audio/*" 表示只允许选择音频文件 -->
  <!-- multiple 表示允许多选 -->
  <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">

  <!-- ========== 上传进度弹窗 ========== -->
  <!-- 上传文件时显示的弹窗，默认隐藏，JS 会控制显示/隐藏 -->
  <div class="upload-modal" id="uploadModal">
    <div class="upload-modal-content">
      <h3>上传中...</h3>  <!-- 弹窗标题 -->
      <!-- 进度条 -->
      <div class="upload-progress-bar">
        <div class="upload-progress" id="uploadProgress"></div>  <!-- 进度条填充部分 -->
      </div>
      <p id="uploadStatus">准备上传</p>  <!-- 显示上传状态，如"正在上传 3/5" -->
    </div>
  </div>

  <!-- ========== JavaScript 文件加载 ========== -->
  <!-- 注意：加载顺序很重要！先加载功能模块，最后加载主入口 -->
  <script src="js/player.js?v=7"></script>   <!-- 播放器核心：播放、暂停、上下曲、进度条 -->
  <script src="js/upload.js"></script>        <!-- 上传功能：文件上传、进度显示 -->
  <script src="js/lyrics-extract.js"></script> <!-- 歌词提取：从音频文件提取内嵌歌词 -->
  <script src="js/lyrics.js"></script>        <!-- 歌词显示：解析 LRC 格式、同步滚动 -->
  <script src="js/playlist.js?v=7"></script>  <!-- 歌单管理：创建、删除、添加歌曲 -->
  <script src="js/trim.js?v=1"></script>      <!-- 音频剪辑：裁剪歌曲片段 -->
  <script src="js/app.js?v=8"></script>       <!-- 主入口：初始化应用、绑定事件（必须最后加载） -->

  <!-- ========== 右键菜单（默认隐藏） ========== -->

  <!-- 歌曲右键菜单：右键点击歌曲时弹出 -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" data-action="rename">重命名</div>  <!-- 重命名歌曲 -->
    <div class="context-menu-item" data-action="add-to-playlist">添加到歌单</div>  <!-- 添加到歌单（有子菜单） -->
    <div class="context-menu-item" data-action="trim">剪辑</div>  <!-- 剪辑音频 -->
    <div class="context-menu-item" data-action="delete">删除</div>  <!-- 删除歌曲 -->
  </div>

  <!-- 添加到歌单的子菜单：鼠标悬停在"添加到歌单"时弹出 -->
  <div class="context-menu submenu" id="addToPlaylistMenu">
    <div class="context-menu-subtitle">选择歌单</div>  <!-- 标题 -->
    <!-- 歌单列表会通过 JavaScript 动态插入这里 -->
  </div>

  <!-- 歌单右键菜单：右键点击歌单时弹出 -->
  <div class="context-menu" id="playlistContextMenu">
    <div class="context-menu-item" data-action="rename-playlist">重命名</div>  <!-- 重命名歌单 -->
    <div class="context-menu-item" data-action="delete-playlist">删除</div>  <!-- 删除歌单 -->
  </div>

  <!-- ========== 剪辑弹窗 ========== -->
  <div class="trim-modal" id="trimModal">
    <div class="trim-modal-content">
      <div class="trim-header">
        <h3 id="trimSongName">剪辑歌曲</h3>
        <button class="trim-close" id="trimClose">✕</button>
      </div>
      <!-- 波形/进度条区域 -->
      <div class="trim-waveform" id="trimWaveform">
        <canvas id="trimCanvas" width="600" height="100"></canvas>
        <!-- 播放光标 -->
        <div class="trim-cursor" id="trimCursor"></div>
        <!-- 选区遮罩 -->
        <div class="trim-selection" id="trimSelection">
          <div class="trim-handle trim-handle-left" id="trimHandleLeft"></div>
          <div class="trim-handle trim-handle-right" id="trimHandleRight"></div>
        </div>
      </div>
      <!-- 时间显示 -->
      <div class="trim-times">
        <div class="trim-time-group">
          <label>开始</label>
          <input type="text" id="trimStart" value="00:00.0" readonly>
        </div>
        <div class="trim-time-group">
          <label>保留时长</label>
          <input type="text" id="trimDuration" value="00:00.0" readonly>
        </div>
        <div class="trim-time-group">
          <label>结束</label>
          <input type="text" id="trimEnd" value="00:00.0" readonly>
        </div>
      </div>
      <!-- 控制按钮 -->
      <div class="trim-controls">
        <button class="trim-btn trim-btn-play" id="trimPlayPause">▶</button>
        <button class="trim-btn trim-btn-primary" id="trimSave">💾 保存</button>
      </div>
      <div class="trim-status" id="trimStatus"></div>
    </div>
  </div>
</body>  <!-- body 结束 -->
</html>  <!-- HTML 文档结束 -->
