<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>音乐播放器</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
  <div class="app">
    <!-- 遮罩层 -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- 左侧：歌曲列表 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div>
          <h2>我的音乐</h2>
          <span class="song-count" id="songCount">0 首</span>
        </div>
        <div class="sidebar-header-right">
          <button id="uploadBtn" class="btn-upload">+ 上传</button>
          <button class="btn-close-sidebar" id="closeSidebar">✕</button>
        </div>
      </div>

      <!-- 歌单区域 -->
      <div class="playlist-section">
        <div class="playlist-header">
          <span class="playlist-title">我的歌单</span>
          <span class="playlist-count" id="playlistCount">0</span>
          <button class="btn-add-playlist" id="playlistAddBtn" title="新建歌单">+</button>
          <input type="text" class="playlist-name-input" id="playlistNameInput" placeholder="输入歌单名称" style="display:none">
        </div>
        <div class="playlist-list" id="playlistList">
        </div>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索歌曲...">
      </div>
      <div class="song-list-header">
        <span class="song-list-title" id="songListTitle">全部歌曲</span>
      </div>
      <div class="song-list" id="songList">
        <div class="empty-tip">暂无歌曲，点击上传</div>
      </div>
      <!-- 分页控件 -->
      <div class="pagination" id="pagination" style="display:none">
        <button class="page-btn" id="pagePrev" disabled>‹</button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button class="page-btn" id="pageNext" disabled>›</button>
      </div>
    </aside>

    <!-- 中间：播放区域 -->
    <main class="main">
      <!-- 手机端菜单按钮 -->
      <button class="btn-menu-mobile" id="menuBtn">☰</button>

      <div class="player-display" id="playerDisplay">
        <div class="cover-wrapper">
          <div class="cover" id="cover">
            <div class="cover-default">♪</div>
          </div>
        </div>
        <div class="song-info">
          <div class="song-title" id="songTitle">未选择歌曲</div>
          <div class="song-artist" id="songArtist"></div>
        </div>
      </div>

      <!-- 歌词面板 -->
      <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyrics-header">
          <span class="lyrics-title">歌词</span>
          <label class="lyrics-upload-btn" id="lyricsUploadBtn" title="上传LRC歌词文件">
            <input type="file" id="lyricsInput" accept=".lrc,.txt" style="display:none">
            + 导入歌词
          </label>
        </div>
        <div class="lyrics-content" id="lyricsContent">
          <div class="lyrics-empty">暂无歌词</div>
        </div>
      </div>
    </main>
  </div>

  <!-- 底部：播放控制栏 -->
  <footer class="player-bar">
    <div class="progress-bar" id="progressBar">
      <div class="progress" id="progress"></div>
    </div>
    <div class="controls">
      <div class="controls-left">
        <span class="time" id="currentTime">00:00</span>
        <span class="time-sep">/</span>
        <span class="time" id="duration">00:00</span>
      </div>
      <div class="controls-center">
        <button class="btn-ctrl" id="shuffleBtn" title="随机播放">⤮</button>
        <button class="btn-ctrl" id="prevBtn" title="上一曲">⏮</button>
        <button class="btn-ctrl btn-play" id="playBtn" title="播放">▶</button>
        <button class="btn-ctrl" id="nextBtn" title="下一曲">⏭</button>
        <button class="btn-ctrl" id="repeatBtn" title="列表循环">↻</button>
        <button class="btn-ctrl" id="lyricsBtn" title="歌词">词</button>
      </div>
      <div class="controls-right">
        <button class="btn-ctrl" id="volumeBtn" title="音量">🔊</button>
        <div class="volume-slider">
          <input type="range" id="volumeSlider" min="0" max="100" value="80">
        </div>
        <span class="volume-value" id="volumeValue">80</span>
      </div>
    </div>
  </footer>

  <!-- 隐藏的文件输入 -->
  <input type="file" id="fileInput" accept="audio/*" multiple style="display:none">

  <!-- 上传进度弹窗 -->
  <div class="upload-modal" id="uploadModal">
    <div class="upload-modal-content">
      <h3>上传中...</h3>
      <div class="upload-progress-bar">
        <div class="upload-progress" id="uploadProgress"></div>
      </div>
      <p id="uploadStatus">准备上传</p>
    </div>
  </div>

  <script src="js/player.js?v=4"></script>
  <script src="js/upload.js"></script>
  <script src="js/lyrics-extract.js"></script>
  <script src="js/lyrics.js"></script>
  <script src="js/playlist.js?v=4"></script>
  <script src="js/app.js?v=4"></script>

  <!-- 右键菜单 -->
  <div class="context-menu" id="contextMenu">
    <div class="context-menu-item" data-action="rename">重命名</div>
    <div class="context-menu-item" data-action="add-to-playlist">添加到歌单</div>
    <div class="context-menu-item" data-action="delete">删除</div>
  </div>

  <!-- 添加到歌单子菜单 -->
  <div class="context-menu submenu" id="addToPlaylistMenu">
    <div class="context-menu-subtitle">选择歌单</div>
  </div>

  <!-- 歌单右键菜单 -->
  <div class="context-menu" id="playlistContextMenu">
    <div class="context-menu-item" data-action="rename-playlist">重命名</div>
    <div class="context-menu-item" data-action="delete-playlist">删除</div>
  </div>
</body>
</html>
